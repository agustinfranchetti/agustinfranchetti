<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes glow-pulse {
          0%, 100% { text-shadow: 0 0 20px rgba(247, 64, 187, 0.6), 0 0 40px rgba(247, 64, 187, 0.3), 0 0 80px rgba(247, 64, 187, 0.1); }
          50% { text-shadow: 0 0 30px rgba(247, 64, 187, 0.8), 0 0 60px rgba(247, 64, 187, 0.5), 0 0 100px rgba(247, 64, 187, 0.2); }
        }

        @keyframes fade-in-up {
          from { opacity: 0; transform: translateY(16px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cursor-blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }

        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-6px); }
        }

        @keyframes scan-line {
          0% { top: -2px; }
          100% { top: 100%; }
        }

        .scene {
          --bg-1: #0d0d0d;
          --bg-2: #1a0a2e;
          --bg-3: #16213e;
          --bg-4: #0d0d0d;
          --accent: #f740bb;
          --accent-2: #7b68ee;
          --text: #e0e0e0;
          --text-dim: #888;
          --grid-color: rgba(247, 64, 187, 0.04);
          --scanline-color: rgba(247, 64, 187, 0.03);

          background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-4));
          background-size: 400% 400%;
          animation: gradient 20s ease infinite;

          width: 100%;
          height: 400px;
          overflow: hidden;
          position: relative;

          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 0;

          font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
          color: var(--text);
        }

        .grid-overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image:
            linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
        }

        .scan-line {
          position: absolute;
          left: 0;
          width: 100%;
          height: 2px;
          background: var(--scanline-color);
          animation: scan-line 8s linear infinite;
          pointer-events: none;
        }

        .content {
          position: relative;
          z-index: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0;
        }

        .name {
          font-size: 42px;
          font-weight: 700;
          letter-spacing: -1px;
          margin: 0;
          padding: 0;
          animation: glow-pulse 4s ease-in-out infinite;
          color: #fff;
        }

        .cursor {
          display: inline-block;
          width: 3px;
          height: 38px;
          background: var(--accent);
          margin-left: 4px;
          vertical-align: middle;
          animation: cursor-blink 1s step-end infinite;
        }

        .tagline {
          font-size: 14px;
          color: var(--text-dim);
          margin: 12px 0 0 0;
          padding: 0;
          letter-spacing: 3px;
          text-transform: uppercase;
          animation: fade-in-up 1s ease 0.3s both;
        }

        .divider {
          width: 60px;
          height: 2px;
          background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
          margin: 20px 0;
          border: none;
          animation: fade-in-up 1s ease 0.5s both;
        }

        .badges {
          display: flex;
          gap: 12px;
          margin-top: 4px;
          animation: fade-in-up 1s ease 0.7s both;
        }

        .badge {
          display: flex;
          align-items: center;
          gap: 6px;
          padding: 6px 14px;
          border: 1px solid rgba(247, 64, 187, 0.2);
          border-radius: 20px;
          font-size: 12px;
          color: var(--text-dim);
          background: rgba(247, 64, 187, 0.05);
          animation: float 6s ease-in-out infinite;
        }

        .badge:nth-child(2) { animation-delay: -2s; }
        .badge:nth-child(3) { animation-delay: -4s; }

        .badge-dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: var(--accent);
        }

        .badge:nth-child(2) .badge-dot { background: var(--accent-2); }
        .badge:nth-child(3) .badge-dot { background: #23d5ab; }

        @media (prefers-color-scheme: light) {
          .scene {
            --bg-1: #fafafa;
            --bg-2: #f0e6ff;
            --bg-3: #e6f0ff;
            --bg-4: #fafafa;
            --accent: #d63384;
            --accent-2: #6f42c1;
            --text: #1a1a1a;
            --text-dim: #666;
            --grid-color: rgba(214, 51, 132, 0.06);
            --scanline-color: rgba(214, 51, 132, 0.03);
          }

          .name {
            color: #1a1a1a;
            animation-name: glow-pulse-light;
          }

          @keyframes glow-pulse-light {
            0%, 100% { text-shadow: 0 0 20px rgba(214, 51, 132, 0.3), 0 0 40px rgba(214, 51, 132, 0.15); }
            50% { text-shadow: 0 0 30px rgba(214, 51, 132, 0.5), 0 0 60px rgba(214, 51, 132, 0.25); }
          }
        }

        @media (prefers-reduced-motion) {
          .scene { animation: none; }
          .name { animation: none; }
          .badge { animation: none; }
          .scan-line { animation: none; display: none; }
          .tagline, .divider, .badges { animation: none; opacity: 1; transform: none; }
          .cursor { animation: none; opacity: 1; }
        }
      </style>

      <div class="scene">
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
        <div class="content">
          <h1 class="name">Agustin Franchetti<span class="cursor"></span></h1>
          <p class="tagline">Frontend Engineer &#183; Builder &#183; Explorer</p>
          <div class="divider"></div>
          <div class="badges">
            <div class="badge"><div class="badge-dot"></div>building things</div>
            <div class="badge"><div class="badge-dot"></div>&#26085;&#26412;&#35486;&#21193;&#24375;&#20013;</div>
            <div class="badge"><div class="badge-dot"></div>shipping MVPs</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
